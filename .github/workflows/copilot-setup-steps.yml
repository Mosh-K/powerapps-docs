name: "Copilot Setup Steps"

# Runs automatically when this file changes, and can be triggered manually
# from the repository's Actions tab to validate the environment.
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # Must be named exactly `copilot-setup-steps` for Copilot to pick it up.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install Python dependencies
              run: pip install requests pandas tabulate
